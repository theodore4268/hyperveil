info:
  name: 'HyperVeil'
  identifier: 'hyperveil'
  description: 'Cyber-styled dark theme for Pterodactyl with purple accents, announcement banners and hyperveil@container branding.'
  version: '1.1.0'
  target: 'beta-2026-01'
  author: 'Theodore'

admin:
  view: 'admin/view.blade.php'
  controller: 'admin/Controller.php'
  css: 'admin/admin.css'
  wrapper: 'admin/wrapper.blade.php'

dashboard:
  css: 'dashboard/dashboard.css'
  wrapper: 'dashboard/wrapper.blade.php'

database:
  migrations: 'database'

requests:
  routers:
    web: 'requests/web.php'
